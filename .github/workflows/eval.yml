name: CI — Lint, Test & Eval

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install CPU-only torch first (faster CI, no GPU needed)
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ tests/ scripts/

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short -x
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          MODEL_BACKEND: transformers
          PYTHONPATH: .

  # ── Eval job (only runs on push to main, not on every PR) ─────────────────
  eval:
    name: Evaluation Gate
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Download CORD v2 (small subset for CI)
        run: |
          python - <<'EOF'
          from datasets import load_dataset
          import json, pathlib
          ds = load_dataset("naver-clova-ix/cord-v2", split="test[:20]")
          out = pathlib.Path("data/processed/test")
          (out / "images").mkdir(parents=True, exist_ok=True)
          records = []
          for i, sample in enumerate(ds):
              p = out / "images" / f"{i:05d}.jpg"
              sample["image"].save(p, format="JPEG", quality=95)
              import json as _json
              gt = _json.loads(sample["ground_truth"])
              from src.data.dataset import extract_target_fields
              records.append({"id": i, "image_path": str(p),
                              "target": extract_target_fields(gt), "augmented": False})
          (out / "metadata.json").write_text(json.dumps(records))
          print(f"Saved {len(records)} test samples")
          EOF
        env:
          PYTHONPATH: .

      - name: Run evaluation (base model, 20 samples)
        run: |
          python src/eval/run_eval.py --split test --processed-dir data/processed
        env:
          MODEL_BACKEND: transformers
          MLFLOW_TRACKING_URI: mlruns
          PYTHONPATH: .

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: reports/
          retention-days: 30

      - name: Check field accuracy threshold
        run: |
          python - <<'EOF'
          import json, pathlib, sys
          # Parse the MLflow latest run metrics
          # Fail CI if field_accuracy drops below 0.70
          THRESHOLD = 0.70
          runs_dir = pathlib.Path("mlruns")
          metric_files = sorted(runs_dir.glob("**/field_accuracy"), key=lambda p: p.stat().st_mtime)
          if not metric_files:
              print("No metric files found — skipping threshold check")
              sys.exit(0)
          latest = metric_files[-1].read_text().strip().split()
          accuracy = float(latest[1])
          print(f"Field accuracy: {accuracy:.4f} (threshold: {THRESHOLD})")
          if accuracy < THRESHOLD:
              print(f"FAIL: field_accuracy {accuracy:.4f} < {THRESHOLD}")
              sys.exit(1)
          print("PASS")
          EOF
